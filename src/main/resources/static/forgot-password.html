<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TutwMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html" style="text-decoration:none;"><div class="logo">Tutw<span>Me</span></div></a>
  <div style="margin-left:auto;">
    <a href="login.html" class="btn-ghost" style="padding:8px 18px;">Back to sign in</a>
  </div>
</header>

<div style="min-height:calc(100vh - 65px); display:flex; align-items:center; justify-content:center; padding:32px 20px; background:linear-gradient(135deg,#fff0f6,#fafafa);">
  <div style="width:100%; max-width:420px;">

    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:36px; margin-bottom:10px;">🔑</div>
      <div style="font-size:28px; font-weight:800; color:var(--navy);">Reset password</div>
      <div style="font-size:14px; color:var(--text-muted); margin-top:6px;">Enter your email and choose a new password</div>
    </div>

    <div class="card" style="padding:28px;" id="reset-form">
      <div id="error-box" style="display:none; background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; padding:10px; font-size:13px; color:#dc2626; font-weight:600; margin-bottom:14px;"></div>

      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">I am a</label>
        <div style="display:flex; gap:8px;">
          <button type="button" id="role-student" onclick="setRole('student',this)" style="flex:1; padding:10px; border:1.5px solid var(--pink); border-radius:8px; background:var(--pink-light); cursor:pointer; font-size:13px; font-weight:700; font-family:inherit; color:var(--pink-dark);">🎒 Student</button>
          <button type="button" id="role-tutor" onclick="setRole('tutor',this)" style="flex:1; padding:10px; border:1.5px solid var(--border); border-radius:8px; background:white; cursor:pointer; font-size:13px; font-weight:700; font-family:inherit; color:var(--text-muted);">📚 Tutor</button>
        </div>
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">Email address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">New password</label>
        <input type="password" id="new-password" placeholder="At least 8 characters">
      </div>

      <div style="margin-bottom:22px;">
        <label style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">Confirm new password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password">
      </div>

      <button class="btn-primary" id="reset-btn" style="width:100%; padding:14px; font-size:15px;" onclick="resetPassword()">Reset password</button>

      <div style="text-align:center; margin-top:16px; font-size:13px; color:var(--text-muted);">
        Remember it? <a href="login.html" style="color:var(--pink); font-weight:600; text-decoration:none;">Back to sign in</a>
      </div>
    </div>

    <div id="success-box" style="display:none;" class="card">
      <div style="text-align:center; padding:24px;">
        <div style="font-size:48px; margin-bottom:14px;">✅</div>
        <h2 style="font-size:20px; font-weight:800; color:var(--navy); margin-bottom:8px;">Password reset!</h2>
        <p style="font-size:14px; color:var(--text-muted); margin-bottom:20px;">You can now sign in with your new password.</p>
        <a href="login.html" class="btn-primary" style="padding:12px 24px;">Go to sign in</a>
      </div>
    </div>
  </div>
</div>

<script src="chatbot.js"></script>
<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8080' : 'https://tutwme-production.up.railway.app';
let selectedRole = 'student';

function setRole(role, btn) {
  selectedRole = role;
  document.querySelectorAll('#role-student, #role-tutor').forEach(b => {
    b.style.borderColor = 'var(--border)'; b.style.background = 'white'; b.style.color = 'var(--text-muted)';
  });
  btn.style.borderColor = 'var(--pink)'; btn.style.background = 'var(--pink-light)'; btn.style.color = 'var(--pink-dark)';
}

async function resetPassword() {
  const errEl = document.getElementById('error-box');
  errEl.style.display = 'none';
  const email = document.getElementById('email').value.trim();
  const newPassword = document.getElementById('new-password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  if (!email || !newPassword || !confirmPassword) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
  if (newPassword.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
  if (newPassword !== confirmPassword) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('reset-btn');
  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    const res = await fetch(`${API}/api/auth/reset-password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, new_password: newPassword, user_type: selectedRole })
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-box').style.display = 'block';
    } else {
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Reset password';
    }
  } catch(e) {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Reset password';
  }
}
</script>
</body>
</html>
