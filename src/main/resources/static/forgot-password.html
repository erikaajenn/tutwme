<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TutwMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <a href="index.html" style="text-decoration:none;"><div class="logo">Tutw<span>Me</span></div></a>
</header>

<div class="page-container" style="max-width:420px;">
  <div class="card" id="reset-form">
    <h1 style="font-size:22px; font-weight:800; color:var(--navy); margin-bottom:6px;">Reset your password</h1>
    <p style="font-size:14px; color:var(--text-muted); margin-bottom:24px;">Enter your email and a new password below.</p>

    <div id="error-box" style="display:none; background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; padding:10px; font-size:13px; color:#dc2626; margin-bottom:16px;"></div>

    <div style="margin-bottom:16px;">
      <label style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">I am a</label>
      <select id="user-type">
        <option value="student">Student</option>
        <option value="tutor">Tutor</option>
      </select>
    </div>

    <div style="margin-bottom:16px;">
      <label style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <div style="margin-bottom:16px;">
      <label style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">New password</label>
      <input type="password" id="new-password" placeholder="At least 8 characters">
    </div>

    <div style="margin-bottom:20px;">
      <label style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:6px;">Confirm new password</label>
      <input type="password" id="confirm-password" placeholder="Re-enter password">
    </div>

    <button class="btn-primary" id="reset-btn" style="width:100%; padding:13px;" onclick="resetPassword()">Reset Password</button>

    <div style="text-align:center; margin-top:16px;">
      <a href="login.html" style="font-size:13px; color:var(--text-muted); text-decoration:none;">← Back to sign in</a>
    </div>
  </div>

  <div id="success-box" style="display:none;" class="card">
    <div style="text-align:center; padding:20px;">
      <div style="font-size:40px; margin-bottom:12px;">✅</div>
      <h2 style="font-size:20px; font-weight:800; color:var(--navy); margin-bottom:8px;">Password reset!</h2>
      <p style="font-size:14px; color:var(--text-muted); margin-bottom:20px;">You can now sign in with your new password.</p>
      <a href="login.html" class="btn-primary" style="padding:12px 24px;">Go to sign in</a>
    </div>
  </div>
</div>

<script src="chatbot.js"></script>
<script>
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8080'
  : 'https://tutwme-production.up.railway.app';

async function resetPassword() {
  const errEl = document.getElementById('error-box');
  errEl.style.display = 'none';

  const userType = document.getElementById('user-type').value;
  const email = document.getElementById('email').value.trim();
  const newPassword = document.getElementById('new-password').value;
  const confirmPassword = document.getElementById('confirm-password').value;

  if (!email || !newPassword || !confirmPassword) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.style.display = 'block';
    return;
  }
  if (newPassword.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    errEl.style.display = 'block';
    return;
  }
  if (newPassword !== confirmPassword) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  btn.textContent = 'Resetting...';

  try {
    const res = await fetch(`${API}/api/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, new_password: newPassword, user_type: userType })
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-box').style.display = 'block';
    } else {
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  } catch(e) {
    errEl.textContent = 'Could not connect. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
