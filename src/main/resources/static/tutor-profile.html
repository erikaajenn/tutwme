<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor Profile — TutwMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <a href="index.html" class="back">←</a>
  <div class="logo">Tutw<span>Me</span></div>
  <div style="margin-left:auto; display:flex; gap:10px;">
    <a href="login.html" class="btn-ghost" style="padding:8px 16px;">Sign in</a>
    <a href="register.html" class="btn-primary" style="padding:8px 16px;">Get started</a>
  </div>
</header>

<div class="page-container" style="max-width:800px;">
  <div id="profile-content">
    <div style="color:var(--text-muted); text-align:center; padding:60px;">Loading tutor profile...</div>
  </div>
</div>

<script src="chatbot.js"></script>
<script>
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8080'
  : 'https://tutwme-production.up.railway.app';

async function loadProfile() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || 1;
  try {
    const [tutor, subjects, reviews] = await Promise.all([
      fetch(`${API}/api/tutors/${id}`).then(r => r.json()),
      fetch(`${API}/api/tutors/${id}/subjects`).then(r => r.json()),
      fetch(`${API}/api/reviews/tutor/${id}`).then(r => r.json()).catch(() => [])
    ]);
    const avatarStyle = tutor.avatar_style || 'adventurer';
    const avatarSeed = tutor.avatar_seed || tutor.first_name + tutor.last_name;
    const avatarUrl = `https://api.dicebear.com/7.x/${avatarStyle}/svg?seed=${encodeURIComponent(avatarSeed)}&size=120`;
    const tags = subjects.map(s => `<span class="tag-pink">${s.name}</span>`).join('');
    const stars = tutor.rating ? Math.round(tutor.rating) : 5;
    document.getElementById('profile-content').innerHTML = `
      <div class="card" style="margin-bottom:20px;">
        <div style="display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap;">
          <img src="${avatarUrl}" style="width:100px; height:100px; border-radius:50%; border:4px solid var(--pink-light); flex-shrink:0;" onerror="this.style.background='var(--pink-light)'; this.style.display='flex'">
          <div style="flex:1;">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:6px;">
              <h1 style="font-size:24px; font-weight:800; color:var(--navy);">${tutor.first_name} ${tutor.last_name}</h1>
              <span class="tag-pink">Verified tutor</span>
            </div>
            <div style="font-size:22px; font-weight:700; color:var(--pink); margin-bottom:8px;">$${tutor.hourly_rate}/hr</div>
            <div style="display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;">${tags}</div>
            <div style="display:flex; gap:6px; margin-bottom:16px;">
              <span class="tag-blue">${tutor.session_types === 'virtual' ? 'Virtual only' : tutor.session_types === 'in-person' ? 'In-person only' : '💻 Virtual & 📍 In-person'}</span>
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
              <a href="booking.html?tutor_id=${tutor.id}" class="btn-primary" style="padding:12px 24px;">Book a Session</a>
              <a href="booking.html?tutor_id=${tutor.id}" class="btn-outline" style="padding:12px 24px;">View availability</a>
            </div>
          </div>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
        <div class="card">
          <div class="section-title">About</div>
          <p style="font-size:14px; color:var(--text-muted); line-height:1.7;">${tutor.bio || 'No bio yet.'}</p>
        </div>
        <div class="card">
          <div class="section-title">Teaching philosophy</div>
          <p style="font-size:14px; color:var(--text-muted); line-height:1.7;">${tutor.teaching_philosophy || 'Every student learns differently. I tailor my approach to what works best for you.'}</p>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px;">
        <div class="section-title">Stats</div>
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; text-align:center;">
          <div><div style="font-size:24px; font-weight:700; color:var(--pink);">${'⭐'.repeat(stars)}</div><div style="font-size:12px; color:var(--text-muted);">Rating</div></div>
          <div><div style="font-size:24px; font-weight:700; color:var(--navy);">${tutor.total_reviews || 0}</div><div style="font-size:12px; color:var(--text-muted);">Reviews</div></div>
          <div><div style="font-size:24px; font-weight:700; color:var(--navy);">${tutor.total_sessions || 0}</div><div style="font-size:12px; color:var(--text-muted);">Sessions</div></div>
          <div><div style="font-size:24px; font-weight:700; color:var(--navy);">${subjects.length}</div><div style="font-size:12px; color:var(--text-muted);">Subjects</div></div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Reviews (${reviews.length})</div>
        ${reviews.length === 0 ? '<p style="color:var(--text-muted); font-size:14px;">No reviews yet — be the first!</p>' :
          reviews.map(r => `
            <div style="padding:14px 0; border-bottom:1px solid var(--border-light);">
              <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                <div style="font-size:13px; font-weight:600; color:var(--navy);">${r.reviewer_name || 'Student'}</div>
                <div style="color:#f59e0b;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
              </div>
              <p style="font-size:14px; color:var(--text-muted); line-height:1.6;">${r.comment || ''}</p>
              <div style="font-size:12px; color:var(--text-muted); margin-top:6px;">${new Date(r.created_at).toLocaleDateString()}</div>
            </div>`).join('')}
      </div>`;
  } catch(e) {
    document.getElementById('profile-content').innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:40px;">Could not load profile.</p>';
  }
}
loadProfile();
</script>
</body>
</html>
