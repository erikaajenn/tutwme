<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — TutwMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <a href="index.html" style="text-decoration:none;"><div class="logo">Tutw<span>Me</span></div></a>
</header>
<div style="text-align:center; padding:40px 20px 28px;">
  <h1 style="font-size:28px; font-weight:900; color:var(--text); margin-bottom:8px;">Welcome, Student! 🎒</h1>
  <p style="font-size:16px; color:var(--text-muted); font-weight:600;">What would you like to do today?</p>
</div>
<div style="display:flex; flex-direction:column; gap:14px; padding:0 20px; max-width:480px; margin:0 auto;">
  <a href="booking.html" class="card" style="display:flex; align-items:center; gap:16px; text-decoration:none; border-color:var(--blue-light);">
    <div style="width:56px; height:56px; border-radius:14px; background:var(--blue-light); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0;">📅</div>
    <div><div style="font-size:17px; font-weight:800; color:var(--blue-dark);">Book a Session</div><div style="font-size:13px; color:var(--text-muted); font-weight:600;">Find a tutor and pick a time</div></div>
    <div style="margin-left:auto; font-size:20px; color:var(--blue);">→</div>
  </a>
  <a href="login.html" class="card" style="display:flex; align-items:center; gap:16px; text-decoration:none; border-color:var(--sage-light);">
    <div style="width:56px; height:56px; border-radius:14px; background:var(--sage-light); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0;">📋</div>
    <div><div style="font-size:17px; font-weight:800; color:var(--sage-dark);">My Bookings</div><div style="font-size:13px; color:var(--text-muted); font-weight:600;">View upcoming and past sessions</div></div>
    <div style="margin-left:auto; font-size:20px; color:var(--sage);">→</div>
  </a>
  <a href="index.html#tutors" class="card" style="display:flex; align-items:center; gap:16px; text-decoration:none; border-color:var(--butter);">
    <div style="width:56px; height:56px; border-radius:14px; background:var(--butter); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0;">🔍</div>
    <div><div style="font-size:17px; font-weight:800; color:#856a00;">Browse Tutors</div><div style="font-size:13px; color:var(--text-muted); font-weight:600;">See all available tutors</div></div>
    <div style="margin-left:auto; font-size:20px; color:#b89300;">→</div>
  </a>
  <a href="register.html" class="card" style="display:flex; align-items:center; gap:16px; text-decoration:none; border-color:var(--rose-light);">
    <div style="width:56px; height:56px; border-radius:14px; background:var(--rose-light); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0;">✨</div>
    <div><div style="font-size:17px; font-weight:800; color:var(--rose-dark);">Create an Account</div><div style="font-size:13px; color:var(--text-muted); font-weight:600;">New here? Sign up to get started</div></div>
    <div style="margin-left:auto; font-size:20px; color:var(--rose);">→</div>
  </a>
</div>
<script src="chatbot.js"></script>
</body>
</html>
