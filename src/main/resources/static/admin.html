<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — TutwMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <a href="index.html" class="back">←</a>
  <div class="logo">Tutw<span>Me</span></div>
  <div style="margin-left:auto; font-size:13px; font-weight:700; color:var(--rose);">Admin Panel</div>
</header>

<div style="max-width:960px; margin:32px auto; padding:0 20px;">
  <h1 style="font-size:24px; font-weight:900; color:var(--text); margin-bottom:24px;">Admin Panel</h1>

  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px;">
    <div class="card" style="text-align:center; padding:20px;">
      <div style="font-size:32px; font-weight:900; color:var(--rose);" id="stat-tutors">-</div>
      <div style="font-size:13px; color:var(--text-muted); font-weight:700;">Tutors</div>
    </div>
    <div class="card" style="text-align:center; padding:20px;">
      <div style="font-size:32px; font-weight:900; color:var(--blue);" id="stat-students">-</div>
      <div style="font-size:13px; color:var(--text-muted); font-weight:700;">Students</div>
    </div>
    <div class="card" style="text-align:center; padding:20px;">
      <div style="font-size:32px; font-weight:900; color:var(--sage);" id="stat-bookings">-</div>
      <div style="font-size:13px; color:var(--text-muted); font-weight:700;">Bookings</div>
    </div>
    <div class="card" style="text-align:center; padding:20px;">
      <div style="font-size:32px; font-weight:900; color:#b89300;" id="stat-subjects">-</div>
      <div style="font-size:13px; color:var(--text-muted); font-weight:700;">Subjects</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; margin-bottom:20px;">
    <button class="btn-primary" style="padding:8px 20px; font-size:13px;" onclick="showTab('tutors', this)">Tutors</button>
    <button class="btn-secondary" style="padding:8px 20px; font-size:13px;" onclick="showTab('bookings', this)">Bookings</button>
    <button style="padding:8px 20px; font-size:13px; background:var(--blue); color:white; border:none; border-radius:50px; font-family:Nunito,sans-serif; font-weight:800; cursor:pointer;" onclick="showTab('students', this)">Students</button>
  </div>

  <div class="card" id="tab-content" style="padding:0; overflow:hidden;">
    <p style="color:var(--text-muted); padding:20px;">Loading...</p>
  </div>
</div>

<script src="chatbot.js"></script>
<script>

  function renderReviews() {
    fetch(`${API}/api/reviews/pending`)
            .then(r => r.json())
            .then(reviews => {
              document.getElementById('tab-content').innerHTML = reviews.length === 0
                      ? '<p style="padding:20px; color:var(--text-muted);">No pending reviews.</p>'
                      : `<table style="${tableStyle}">
          <thead><tr>
            <th style="${thStyle}">Student</th>
            <th style="${thStyle}">Tutor</th>
            <th style="${thStyle}">Rating</th>
            <th style="${thStyle}">Review</th>
            <th style="${thStyle}">Action</th>
          </tr></thead>
          <tbody>${reviews.map(r => `<tr>
            <td style="${tdStyle}">${r.reviewer_name || 'Student'}</td>
            <td style="${tdStyle}">${r.reviewee_name || 'Tutor'}</td>
            <td style="${tdStyle}">${'★'.repeat(r.rating)}</td>
            <td style="${tdStyle}" style="max-width:200px;">${r.comment || ''}</td>
            <td style="${tdStyle}">
              <button onclick="approveReview(${r.id})" style="background:var(--green-mid); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px; margin-right:6px;">Approve</button>
              <button onclick="rejectReview(${r.id})" style="background:#dc2626; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px;">Reject</button>
            </td>
          </tr>`).join('')}</tbody>
        </table>`;
            }).catch(() => {
      document.getElementById('tab-content').innerHTML = '<p style="padding:20px; color:var(--text-muted);">Could not load reviews.</p>';
    });
  }

  async function approveReview(id) {
    await fetch(`${API}/api/reviews/${id}/approve`, { method: 'PATCH' });
    renderReviews();
  }

  async function rejectReview(id) {
    await fetch(`${API}/api/reviews/${id}/reject`, { method: 'PATCH' });
    renderReviews();
  }
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8080'
  : 'https://tutwme-production.up.railway.app';

let allTutors = [], allBookings = [], allStudents = [];

const tableStyle = `width:100%; border-collapse:collapse; font-size:14px;`;
const thStyle = `background:var(--rose-light); color:var(--rose-dark); padding:12px 16px; text-align:left; font-weight:700; font-size:13px;`;
const tdStyle = `padding:12px 16px; border-bottom:1px solid var(--border); color:var(--text);`;

async function loadAll() {
  const [tutors, bookings, students, subjects] = await Promise.all([
    fetch(`${API}/api/tutors`).then(r => r.json()),
    fetch(`${API}/api/bookings`).then(r => r.json()),
    fetch(`${API}/api/students`).then(r => r.json()),
    fetch(`${API}/api/subjects`).then(r => r.json())
  ]);
  allTutors = tutors; allBookings = bookings; allStudents = students;
  document.getElementById('stat-tutors').textContent = tutors.length;
  document.getElementById('stat-bookings').textContent = bookings.length;
  document.getElementById('stat-students').textContent = students.length;
  document.getElementById('stat-subjects').textContent = subjects.length;
  renderTutors();
}

function showTab(tab, btn) {
  if (tab === 'tutors') renderTutors();
  if (tab === 'bookings') renderBookings();
  if (tab === 'students') renderStudents();
}

function renderTutors() {
  document.getElementById('tab-content').innerHTML = `
    <table style="${tableStyle}">
      <thead><tr>
        <th style="${thStyle}">Name</th>
        <th style="${thStyle}">Email</th>
        <th style="${thStyle}">Phone</th>
        <th style="${thStyle}">Rate</th>
      </tr></thead>
      <tbody>${allTutors.map(t => `<tr>
        <td style="${tdStyle}">${t.first_name} ${t.last_name}</td>
        <td style="${tdStyle}">${t.email}</td>
        <td style="${tdStyle}">${t.phone}</td>
        <td style="${tdStyle}"><span class="tag-sage">$${t.hourly_rate}/hr</span></td>
      </tr>`).join('')}</tbody>
    </table>`;
}

function renderBookings() {
  document.getElementById('tab-content').innerHTML = `
    <table style="${tableStyle}">
      <thead><tr>
        <th style="${thStyle}">Student</th>
        <th style="${thStyle}">Tutor</th>
        <th style="${thStyle}">Subject</th>
        <th style="${thStyle}">Date</th>
        <th style="${thStyle}">Status</th>
      </tr></thead>
      <tbody>${allBookings.map(b => `<tr>
        <td style="${tdStyle}">${b.student_first} ${b.student_last}</td>
        <td style="${tdStyle}">${b.tutor_first} ${b.tutor_last}</td>
        <td style="${tdStyle}">${b.subject_name}</td>
        <td style="${tdStyle}">${new Date(b.scheduled_at).toLocaleDateString()}</td>
        <td style="${tdStyle}"><span class="tag-${b.status === 'confirmed' ? 'sage' : b.status === 'pending' ? 'blue' : 'rose'}">${b.status}</span></td>
      </tr>`).join('')}</tbody>
    </table>`;
}

function renderStudents() {
  document.getElementById('tab-content').innerHTML = `
    <table style="${tableStyle}">
      <thead><tr>
        <th style="${thStyle}">Name</th>
        <th style="${thStyle}">Email</th>
        <th style="${thStyle}">Grade</th>
      </tr></thead>
      <tbody>${allStudents.map(s => `<tr>
        <td style="${tdStyle}">${s.first_name} ${s.last_name}</td>
        <td style="${tdStyle}">${s.email}</td>
        <td style="${tdStyle}">${s.grade_level || '—'}</td>
      </tr>`).join('')}</tbody>
    </table>`;

  <button style="padding:8px 20px; font-size:13px; background:#f59e0b; color:white; border:none; border-radius:50px; font-family:Inter,sans-serif; font-weight:800; cursor:pointer;"
          onClick="showTab('reviews', this)">Reviews ⭐</button>
}

loadAll();
</script>
</body>
</html>
