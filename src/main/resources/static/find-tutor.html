<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Tutor — TutwMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <a href="index.html" style="text-decoration:none;"><div class="logo">Tutw<span>Me</span></div></a>
  <div style="margin-left:auto; display:flex; gap:10px;">
    <a href="login.html" class="btn-ghost" style="padding:8px 16px;">Sign in</a>
    <a href="register.html" class="btn-primary" style="padding:8px 16px;">Get started</a>
  </div>
</header>

<div style="background:linear-gradient(135deg,#fff0f6,#fafafa); padding:40px 20px 32px; text-align:center;">
  <h1 style="font-size:32px; font-weight:800; color:var(--navy); margin-bottom:8px;">Find your perfect tutor</h1>
  <p style="font-size:15px; color:var(--text-muted); margin-bottom:24px;">Filter by subject, grade, session type and price</p>
  <div style="max-width:500px; margin:0 auto; position:relative;">
    <input type="text" id="search-input" placeholder="Search by subject, name or keyword..." oninput="filterTutors()" style="padding-left:44px; font-size:15px;">
    <span style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:18px;">🔍</span>
  </div>
</div>

<div class="page-container">
  <div style="display:flex; gap:20px; align-items:flex-start;">

    <!-- Filters sidebar -->
    <div style="width:220px; flex-shrink:0;">
      <div class="card" style="position:sticky; top:80px;">
        <div style="font-size:15px; font-weight:700; color:var(--navy); margin-bottom:16px;">Filters</div>

        <div style="margin-bottom:16px;">
          <div style="font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em;">Subject</div>
          <select id="filter-subject" onchange="filterTutors()" style="font-size:13px; padding:8px 10px;">
            <option value="">All subjects</option>
          </select>
        </div>

        <div style="margin-bottom:16px;">
          <div style="font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em;">Session type</div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;">
              <input type="radio" name="session-type" value="" onchange="filterTutors()" checked> All
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;">
              <input type="radio" name="session-type" value="virtual" onchange="filterTutors()"> Virtual
            </label>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer;">
              <input type="radio" name="session-type" value="in-person" onchange="filterTutors()"> In-person
            </label>
          </div>
        </div>

        <div style="margin-bottom:16px;">
          <div style="font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em;">Max price/hr</div>
          <input type="range" id="filter-price" min="20" max="150" value="150" oninput="updatePrice(this.value)" style="width:100%;">
          <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">Up to $<span id="price-label">150</span>/hr</div>
        </div>

        <button onclick="clearFilters()" class="btn-ghost" style="width:100%; padding:8px; font-size:13px;">Clear filters</button>
      </div>
    </div>

    <!-- Tutor grid -->
    <div style="flex:1;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <div style="font-size:14px; color:var(--text-muted);" id="results-count">Loading...</div>
        <select id="sort-by" onchange="sortTutors()" style="font-size:13px; padding:8px 12px; width:auto;">
          <option value="name">Sort by name</option>
          <option value="price-low">Price: low to high</option>
          <option value="price-high">Price: high to low</option>
          <option value="rating">Top rated</option>
        </select>
      </div>
      <div id="tutors-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px;"></div>
    </div>
  </div>
</div>

<script src="chatbot.js"></script>
<script>
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8080'
  : 'https://tutwme-production.up.railway.app';

let allTutors = [];
let tutorSubjects = {};

async function loadData() {
  const [tutors, subjects] = await Promise.all([
    fetch(`${API}/api/tutors`).then(r => r.json()),
    fetch(`${API}/api/subjects`).then(r => r.json())
  ]);
  allTutors = tutors;
  const subjectSelect = document.getElementById('filter-subject');
  subjects.forEach(s => {
    subjectSelect.innerHTML += `<option value="${s.name}">${s.name}</option>`;
  });
  for (const tutor of tutors) {
    const subs = await fetch(`${API}/api/tutors/${tutor.id}/subjects`).then(r => r.json());
    tutorSubjects[tutor.id] = subs;
  }
  renderTutors(tutors);
}

function filterTutors() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const subject = document.getElementById('filter-subject').value;
  const sessionType = document.querySelector('input[name="session-type"]:checked').value;
  const maxPrice = parseInt(document.getElementById('filter-price').value);
  let filtered = allTutors.filter(t => {
    const subs = tutorSubjects[t.id] || [];
    const matchSearch = !search || `${t.first_name} ${t.last_name} ${t.bio}`.toLowerCase().includes(search);
    const matchSubject = !subject || subs.some(s => s.name === subject);
    const matchType = !sessionType || t.session_types === sessionType || t.session_types === 'both';
    const matchPrice = t.hourly_rate <= maxPrice;
    return matchSearch && matchSubject && matchType && matchPrice;
  });
  sortAndRender(filtered);
}

function sortTutors() { filterTutors(); }

function sortAndRender(tutors) {
  const sort = document.getElementById('sort-by').value;
  if (sort === 'price-low') tutors.sort((a,b) => a.hourly_rate - b.hourly_rate);
  if (sort === 'price-high') tutors.sort((a,b) => b.hourly_rate - a.hourly_rate);
  if (sort === 'rating') tutors.sort((a,b) => (b.rating||0) - (a.rating||0));
  if (sort === 'name') tutors.sort((a,b) => a.first_name.localeCompare(b.first_name));
  renderTutors(tutors);
}

function renderTutors(tutors) {
  const grid = document.getElementById('tutors-grid');
  document.getElementById('results-count').textContent = `${tutors.length} tutor${tutors.length !== 1 ? 's' : ''} found`;
  if (!tutors.length) {
    grid.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:40px; grid-column:1/-1;">No tutors match your filters. Try adjusting them!</div>';
    return;
  }
  grid.innerHTML = tutors.map(t => {
    const subs = tutorSubjects[t.id] || [];
    const tags = subs.map(s => `<span class="tag-pink">${s.name}</span>`).join('');
    const avatarUrl = `https://api.dicebear.com/7.x/${t.avatar_style||'adventurer'}/svg?seed=${encodeURIComponent(t.avatar_seed||t.first_name+t.last_name)}&size=64`;
    return `
      <div class="card card-hover" style="cursor:pointer;" onclick="window.location.href='tutor-profile.html?id=${t.id}'">
        <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
          <img src="${avatarUrl}" style="width:52px; height:52px; border-radius:50%; border:2px solid var(--pink-light); flex-shrink:0;" onerror="this.style.display='none'">
          <div>
            <div style="font-size:15px; font-weight:700; color:var(--navy);">${t.first_name} ${t.last_name}</div>
            <div style="font-size:13px; color:var(--pink); font-weight:600;">$${t.hourly_rate}/hr</div>
          </div>
        </div>
        <div style="font-size:13px; color:var(--text-muted); margin-bottom:10px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${t.bio}</div>
        <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;">${tags}</div>
        <div style="display:flex; gap:6px; margin-bottom:12px;">
          <span class="tag-blue" style="font-size:11px;">${t.session_types === 'virtual' ? '💻 Virtual' : t.session_types === 'in-person' ? '📍 In-person' : '💻 Virtual & 📍 In-person'}</span>
        </div>
        <button class="btn-primary" style="width:100%; padding:9px; font-size:13px;" onclick="event.stopPropagation(); window.location.href='booking.html?tutor_id=${t.id}'">Book session</button>
      </div>`;
  }).join('');
}

function updatePrice(val) {
  document.getElementById('price-label').textContent = val;
  filterTutors();
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-subject').value = '';
  document.querySelector('input[name="session-type"][value=""]').checked = true;
  document.getElementById('filter-price').value = 150;
  document.getElementById('price-label').textContent = 150;
  renderTutors(allTutors);
}

loadData();
</script>
</body>
</html>
