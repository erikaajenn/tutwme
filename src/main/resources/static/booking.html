<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Session — TutwMe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <a href="index.html" style="text-decoration:none;"><div class="logo">Tutw<span>Me</span></div></a>
  <div style="margin-left:auto; display:flex; gap:20px;">
    <a href="login.html" style="color:var(--text-muted); text-decoration:none; font-weight:700; font-size:14px;">Sign in</a>
  </div>
</header>

<div style="text-align:center; padding:36px 20px 24px;">
  <h1 style="font-size:28px; font-weight:900; color:var(--text); margin-bottom:8px;">Book a Session</h1>
  <p style="font-size:15px; color:var(--text-muted); font-weight:600;">Choose your tutor, subject and time</p>
</div>

<div style="max-width:560px; margin:0 auto; padding:0 20px 40px;">
  <div class="card">
    <div style="display:none; background:#f0fdf4; border:2px solid #86efac; border-radius:10px; padding:16px; text-align:center; margin-bottom:16px;" id="success">
      <div style="font-size:18px; font-weight:900; color:#15803d; margin-bottom:4px;">Booking confirmed!</div>
      <div style="font-size:14px; color:#166534; font-weight:600;">We'll be in touch shortly.</div>
    </div>
    <div style="display:none; background:#fef2f2; border:2px solid #fca5a5; border-radius:10px; padding:14px; font-size:13px; color:#dc2626; font-weight:700; margin-bottom:16px;" id="error">Something went wrong. Please try again.</div>

    <div style="margin-bottom:18px;">
      <label style="display:block; font-size:13px; font-weight:700; color:var(--text-muted); margin-bottom:6px;">Select a Tutor</label>
      <select id="tutor-select" onchange="onTutorChange()">
        <option value="">-- Choose a tutor --</option>
      </select>
    </div>

    <div style="display:none; background:var(--blue-light); border-radius:10px; padding:14px; margin-bottom:18px;" id="tutor-info">
      <div style="font-size:15px; font-weight:800; color:var(--blue-dark);" id="tutor-name"></div>
      <div style="font-size:13px; color:var(--blue-dark); margin-top:2px;" id="tutor-rate"></div>
      <div style="font-size:13px; color:var(--text-muted); margin-top:4px;" id="tutor-bio"></div>
    </div>

    <div style="margin-bottom:18px;">
      <label style="display:block; font-size:13px; font-weight:700; color:var(--text-muted); margin-bottom:6px;">Subject</label>
      <select id="subject-select"><option value="">-- Choose a subject --</option></select>
    </div>

    <div style="margin-bottom:18px;">
      <label style="display:block; font-size:13px; font-weight:700; color:var(--text-muted); margin-bottom:6px;">Date & Time</label>
      <input type="datetime-local" id="scheduled-at">
    </div>

    <div style="margin-bottom:24px;">
      <label style="display:block; font-size:13px; font-weight:700; color:var(--text-muted); margin-bottom:6px;">Duration</label>
      <select id="duration">
        <option value="30">30 minutes</option>
        <option value="60" selected>60 minutes</option>
        <option value="90">90 minutes</option>
        <option value="120">120 minutes</option>
      </select>
    </div>

    <button class="btn-primary" style="width:100%; padding:14px; font-size:16px;" onclick="submitBooking()">Confirm Booking</button>
  </div>
</div>

<script src="chatbot.js"></script>
<script>
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8080'
  : 'https://tutwme-production.up.railway.app';

let tutors = [];

async function loadTutors() {
  const res = await fetch(`${API}/api/tutors`);
  tutors = await res.json();
  const select = document.getElementById('tutor-select');
  tutors.forEach(t => {
    select.innerHTML += `<option value="${t.id}">${t.first_name} ${t.last_name} — $${t.hourly_rate}/hr</option>`;
  });
  const params = new URLSearchParams(window.location.search);
  if (params.get('tutor_id')) { select.value = params.get('tutor_id'); onTutorChange(); }
}

async function onTutorChange() {
  const id = document.getElementById('tutor-select').value;
  if (!id) return;
  const tutor = tutors.find(t => t.id == id);
  document.getElementById('tutor-name').textContent = `${tutor.first_name} ${tutor.last_name}`;
  document.getElementById('tutor-rate').textContent = `$${tutor.hourly_rate}/hr`;
  document.getElementById('tutor-bio').textContent = tutor.bio;
  document.getElementById('tutor-info').style.display = 'block';
  const res = await fetch(`${API}/api/tutors/${id}/subjects`);
  const subjects = await res.json();
  const subSelect = document.getElementById('subject-select');
  subSelect.innerHTML = '<option value="">-- Choose a subject --</option>';
  subjects.forEach(s => { subSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`; });
}

async function submitBooking() {
  const tutor_id = document.getElementById('tutor-select').value;
  const subject_id = document.getElementById('subject-select').value;
  const scheduled_at = document.getElementById('scheduled-at').value;
  const duration_minutes = document.getElementById('duration').value;
  if (!tutor_id || !subject_id || !scheduled_at) { alert('Please fill in all fields.'); return; }
  try {
    const res = await fetch(`${API}/api/bookings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tutor_id: parseInt(tutor_id), student_id: 1, subject_id: parseInt(subject_id), scheduled_at, duration_minutes: parseInt(duration_minutes) })
    });
    if (res.ok) {
      document.getElementById('success').style.display = 'block';
      setTimeout(async () => {
        const bookings = await fetch(`${API}/api/bookings`).then(r=>r.json());
        const latest = bookings[bookings.length - 1];
        if (latest) window.location.href = `payment.html?booking_id=${latest.id}`;
      }, 1500);
    } else {
      document.getElementById('error').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('error').style.display = 'block';
  }
}

loadTutors();
</script>
</body>
</html>
